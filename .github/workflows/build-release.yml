name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        default: 'test'

jobs:
  build:
    name: Build Linux packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            patchelf \
            rsync \
            libarchive-tools \
            libgl1 \
            libegl1 \
            libasound2t64 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxkbcommon0
          pip install --upgrade pip
          pip install uv

      - name: Install fpm
        run: |
          sudo gem install fpm

      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          make all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: build/pkg/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: packages-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cluster ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/*.deb
            artifacts/*.pkg.tar.zst
