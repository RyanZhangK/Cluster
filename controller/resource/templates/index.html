<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战鼓-后台管理</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <h1>战鼓-后台管理</h1>
            <nav class="main-nav">
                <button class="nav-link active" data-tab="status">状态预览</button>
                <button class="nav-link" data-tab="config">系统配置</button>
                <button class="nav-link" data-tab="logs">系统日志</button>
            </nav>
        </header>

        <!-- 主要内容区域 -->
        <main class="app-main">
            <!-- 状态预览页 -->
            <div id="status-tab" class="tab-content active">
                <h2>状态预览</h2>
                <div class="loading-indicator">加载中...</div>
            </div>

            <!-- 系统配置页（待完善） -->
            <div id="config-tab" class="tab-content">
                <h2>系统配置</h2>
                <div class="placeholder-text">功能开发中，敬请期待</div>
            </div>

            <!-- 系统日志页 -->
            <div id="logs-tab" class="tab-content">
                <h2>系统日志</h2>
                <div class="loading-indicator">加载中...</div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="app-footer">
            <p>战鼓系统 v1.0.1 &copy; 2025</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
